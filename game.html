<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ایر هاکی</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }

  body {
    background: #0a0a1a;
    font-family: 'Vazirmatn', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    color: #fff;
  }

  #game-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 420px;
    padding: 10px;
    gap: 8px;
  }

  .scoreboard {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 10px 20px;
    backdrop-filter: blur(10px);
  }

  .score-box {
    text-align: center;
  }

  .score-label {
    font-size: 11px;
    opacity: 0.6;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .score-value {
    font-size: 36px;
    font-weight: 900;
    line-height: 1;
  }

  .score-box.player .score-value { color: #00f5ff; }
  .score-box.ai .score-value { color: #ff4466; }

  .score-divider {
    font-size: 24px;
    opacity: 0.3;
  }

  #canvas-wrapper {
    position: relative;
    width: 100%;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0, 245, 255, 0.15), 0 0 80px rgba(255, 68, 102, 0.1);
  }

  #gameCanvas {
    display: block;
    width: 100%;
    cursor: none;
  }

  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    transition: opacity 0.3s;
    z-index: 10;
  }

  #overlay.hidden { opacity: 0; pointer-events: none; }

  .overlay-title {
    font-size: 28px;
    font-weight: 900;
    margin-bottom: 8px;
  }

  .overlay-sub {
    font-size: 14px;
    opacity: 0.6;
    margin-bottom: 24px;
    text-align: center;
  }

  .btn {
    background: linear-gradient(135deg, #00f5ff, #0088ff);
    color: #000;
    border: none;
    padding: 14px 36px;
    font-size: 16px;
    font-weight: 700;
    font-family: 'Vazirmatn', sans-serif;
    border-radius: 50px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 0 20px rgba(0, 245, 255, 0.4);
  }

  .btn:active { transform: scale(0.95); }
  .btn.red {
    background: linear-gradient(135deg, #ff4466, #ff0055);
    box-shadow: 0 0 20px rgba(255, 68, 102, 0.4);
  }

  .goal-flash {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0;
    z-index: 5;
    transition: opacity 0.1s;
  }

  .goal-flash.player { background: radial-gradient(ellipse, rgba(0,245,255,0.3) 0%, transparent 70%); }
  .goal-flash.ai { background: radial-gradient(ellipse, rgba(255,68,102,0.3) 0%, transparent 70%); }
  .goal-flash.show { opacity: 1; }

  .controls-hint {
    font-size: 11px;
    opacity: 0.4;
    text-align: center;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div id="game-container">
  <div class="scoreboard">
    <div class="score-box ai">
      <div class="score-label">🤖 هوش مصنوعی</div>
      <div class="score-value" id="ai-score">0</div>
    </div>
    <div class="score-divider">|</div>
    <div class="score-box player">
      <div class="score-value" id="player-score">0</div>
      <div class="score-label">شما 🧑</div>
    </div>
  </div>

  <div id="canvas-wrapper">
    <canvas id="gameCanvas"></canvas>
    <div class="goal-flash player" id="player-flash"></div>
    <div class="goal-flash ai" id="ai-flash"></div>

    <div id="overlay">
      <div class="overlay-title">🏒 ایر هاکی</div>
      <div class="overlay-sub">شما پایین هستید<br>هوش مصنوعی بالا</div>
      <button class="btn" onclick="startGame()">شروع بازی</button>
    </div>
  </div>

  <div class="controls-hint">لمس کنید و بکشید تا مالت حرکت کند</div>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
}

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// ابعاد بازی
const W = 360;
const H = 540;
canvas.width = W;
canvas.height = H;

// تنظیمات
const WINNING_SCORE = 7;
const MALLET_R = 26;
const PUCK_R = 18;
const GOAL_W = 120;

// رنگ‌ها
const COLORS = {
  bg: '#0d0d24',
  field: '#0f0f2a',
  line: 'rgba(255,255,255,0.08)',
  centerCircle: 'rgba(255,255,255,0.06)',
  playerMallet: '#00f5ff',
  aiMallet: '#ff4466',
  puck: '#ffffff',
  goalPlayer: 'rgba(0,245,255,0.4)',
  goalAi: 'rgba(255,68,102,0.4)',
  goalLine: 'rgba(255,255,255,0.15)',
  glowPlayer: '#00f5ff',
  glowAi: '#ff4466',
};

let state = {};
let animId = null;
let gameRunning = false;
let lastTime = 0;

function initState() {
  return {
    puck: { x: W/2, y: H/2, vx: (Math.random()-0.5)*6, vy: 4 },
    player: { x: W/2, y: H - 90 },
    ai: { x: W/2, y: 90 },
    playerScore: 0,
    aiScore: 0,
    targetAiX: W/2,
    targetAiY: 90,
  };
}

function startGame() {
  document.getElementById('overlay').classList.add('hidden');
  state = initState();
  gameRunning = true;
  lastTime = performance.now();
  if (animId) cancelAnimationFrame(animId);
  loop(lastTime);
}

function loop(ts) {
  const dt = Math.min((ts - lastTime) / 16.67, 3);
  lastTime = ts;
  update(dt);
  draw();
  if (gameRunning) animId = requestAnimationFrame(loop);
}

function update(dt) {
  const p = state.puck;

  // حرکت توپ
  p.x += p.vx * dt;
  p.y += p.vy * dt;

  // برخورد با دیوارها
  if (p.x - PUCK_R < 0) { p.x = PUCK_R; p.vx = Math.abs(p.vx); }
  if (p.x + PUCK_R > W) { p.x = W - PUCK_R; p.vx = -Math.abs(p.vx); }

  // گل پایین (بازیکن باخت)
  const goalX1 = (W - GOAL_W) / 2;
  const goalX2 = goalX1 + GOAL_W;
  if (p.y + PUCK_R > H && p.x > goalX1 && p.x < goalX2) {
    score('ai'); return;
  }
  // گل بالا (بازیکن برد)
  if (p.y - PUCK_R < 0 && p.x > goalX1 && p.x < goalX2) {
    score('player'); return;
  }
  // برخورد با دیوار بالا/پایین (خارج از دروازه)
  if (p.y - PUCK_R < 0) { p.y = PUCK_R; p.vy = Math.abs(p.vy); }
  if (p.y + PUCK_R > H) { p.y = H - PUCK_R; p.vy = -Math.abs(p.vy); }

  // برخورد با مالت بازیکن
  collideMallet(state.player, COLORS.playerMallet);
  // برخورد با مالت هوش مصنوعی
  collideMallet(state.ai, COLORS.aiMallet);

  // هوش مصنوعی
  updateAI(dt);

  // کاهش سرعت
  const MAX_SPEED = 18;
  const speed = Math.hypot(p.vx, p.vy);
  if (speed > MAX_SPEED) {
    p.vx = p.vx / speed * MAX_SPEED;
    p.vy = p.vy / speed * MAX_SPEED;
  }
}

function collideMallet(mallet, color) {
  const p = state.puck;
  const dx = p.x - mallet.x;
  const dy = p.y - mallet.y;
  const dist = Math.hypot(dx, dy);
  const minDist = MALLET_R + PUCK_R;
  if (dist < minDist && dist > 0) {
    const nx = dx / dist;
    const ny = dy / dist;
    p.x = mallet.x + nx * minDist;
    p.y = mallet.y + ny * minDist;
    const dot = p.vx * nx + p.vy * ny;
    p.vx -= 2 * dot * nx;
    p.vy -= 2 * dot * ny;
    const boost = 1.15;
    p.vx *= boost;
    p.vy *= boost;
  }
}

function updateAI(dt) {
  const p = state.puck;
  const ai = state.ai;
  
  // پیش‌بینی موقعیت توپ
  let predX = p.x + p.vx * 8;
  let predY = p.y + p.vy * 8;
  
  // محدوده نیمه هوش مصنوعی
  const aiZone = H / 2;
  
  if (p.vy < 0 && p.y < aiZone) {
    // توپ به سمت هوش مصنوعی میاد - تهاجمی
    state.targetAiX = predX;
    state.targetAiY = Math.max(MALLET_R, Math.min(aiZone - MALLET_R, predY - MALLET_R * 2));
  } else {
    // دفاعی - برو جلوی دروازه
    state.targetAiX = W / 2;
    state.targetAiY = MALLET_R + 20;
  }

  // محدود کردن به نیمه هوش مصنوعی
  state.targetAiX = Math.max(MALLET_R, Math.min(W - MALLET_R, state.targetAiX));
  state.targetAiY = Math.max(MALLET_R, Math.min(H/2 - MALLET_R, state.targetAiY));

  const speed = 5.5 * dt;
  const dxAi = state.targetAiX - ai.x;
  const dyAi = state.targetAiY - ai.y;
  const dist = Math.hypot(dxAi, dyAi);
  if (dist > 1) {
    ai.x += (dxAi / dist) * Math.min(speed, dist);
    ai.y += (dyAi / dist) * Math.min(speed, dist);
  }
}

function score(who) {
  if (who === 'player') {
    state.playerScore++;
    document.getElementById('player-score').textContent = state.playerScore;
    flashGoal('player');
  } else {
    state.aiScore++;
    document.getElementById('ai-score').textContent = state.aiScore;
    flashGoal('ai');
  }
  
  if (state.playerScore >= WINNING_SCORE || state.aiScore >= WINNING_SCORE) {
    endGame(who === 'player' ? 'player' : 'ai');
    return;
  }
  
  // ریست توپ
  setTimeout(() => {
    state.puck = { 
      x: W/2, y: H/2, 
      vx: (Math.random()-0.5) * 6, 
      vy: who === 'player' ? -4 : 4 
    };
  }, 600);
}

function flashGoal(who) {
  const el = document.getElementById(who + '-flash');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 400);
}

function endGame(winner) {
  gameRunning = false;
  
  // ارسال نتیجه به تلگرام
  if (tg) {
    tg.sendData(JSON.stringify({
      playerScore: state.playerScore,
      aiScore: state.aiScore,
      winner: winner
    }));
  }
  
  const overlay = document.getElementById('overlay');
  overlay.innerHTML = `
    <div class="overlay-title">${winner === 'player' ? '🎉 بردید!' : '😔 باختید!'}</div>
    <div class="overlay-sub">
      نتیجه: ${state.playerScore} - ${state.aiScore}
    </div>
    <button class="btn ${winner === 'ai' ? 'red' : ''}" onclick="resetGame()">دوباره بازی کن</button>
  `;
  overlay.classList.remove('hidden');
}

function resetGame() {
  document.getElementById('player-score').textContent = '0';
  document.getElementById('ai-score').textContent = '0';
  startGame();
}

// ── رسم ──────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);
  
  // زمینه
  ctx.fillStyle = COLORS.field;
  ctx.fillRect(0, 0, W, H);
  
  // خط میانی
  ctx.strokeStyle = COLORS.line;
  ctx.lineWidth = 2;
  ctx.setLineDash([12, 8]);
  ctx.beginPath();
  ctx.moveTo(0, H/2);
  ctx.lineTo(W, H/2);
  ctx.stroke();
  ctx.setLineDash([]);
  
  // دایره مرکزی
  ctx.strokeStyle = COLORS.centerCircle;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(W/2, H/2, 50, 0, Math.PI*2);
  ctx.stroke();
  
  // دروازه‌ها
  const gx1 = (W - GOAL_W) / 2;
  const gx2 = gx1 + GOAL_W;
  
  // دروازه بالا (هوش مصنوعی)
  ctx.fillStyle = 'rgba(255,68,102,0.12)';
  ctx.fillRect(gx1, 0, GOAL_W, 8);
  ctx.strokeStyle = COLORS.aiMallet;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(gx1, 0); ctx.lineTo(gx1, 16);
  ctx.moveTo(gx2, 0); ctx.lineTo(gx2, 16);
  ctx.stroke();
  ctx.strokeStyle = 'rgba(255,68,102,0.5)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(gx1, 0); ctx.lineTo(gx2, 0);
  ctx.stroke();

  // دروازه پایین (بازیکن)
  ctx.fillStyle = 'rgba(0,245,255,0.12)';
  ctx.fillRect(gx1, H-8, GOAL_W, 8);
  ctx.strokeStyle = COLORS.playerMallet;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(gx1, H); ctx.lineTo(gx1, H-16);
  ctx.moveTo(gx2, H); ctx.lineTo(gx2, H-16);
  ctx.stroke();
  ctx.strokeStyle = 'rgba(0,245,255,0.5)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(gx1, H); ctx.lineTo(gx2, H);
  ctx.stroke();
  
  // مالت هوش مصنوعی
  drawMallet(state.ai.x, state.ai.y, COLORS.aiMallet, '#ff0044');
  
  // مالت بازیکن
  drawMallet(state.player.x, state.player.y, COLORS.playerMallet, '#00ccdd');
  
  // توپ
  drawPuck(state.puck.x, state.puck.y);
}

function drawMallet(x, y, color, inner) {
  // سایه
  ctx.shadowColor = color;
  ctx.shadowBlur = 20;
  
  // حلقه بیرونی
  ctx.strokeStyle = color;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(x, y, MALLET_R, 0, Math.PI*2);
  ctx.stroke();
  
  // داخل
  const grad = ctx.createRadialGradient(x-4, y-4, 2, x, y, MALLET_R-4);
  grad.addColorStop(0, 'rgba(255,255,255,0.25)');
  grad.addColorStop(1, inner + 'aa');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y, MALLET_R-3, 0, Math.PI*2);
  ctx.fill();
  
  // نقطه مرکزی
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(x, y, 5, 0, Math.PI*2);
  ctx.fill();
  
  ctx.shadowBlur = 0;
}

function drawPuck(x, y) {
  // سایه
  ctx.shadowColor = 'rgba(255,255,255,0.6)';
  ctx.shadowBlur = 15;
  
  const grad = ctx.createRadialGradient(x-4, y-4, 1, x, y, PUCK_R);
  grad.addColorStop(0, '#ffffff');
  grad.addColorStop(0.5, '#cccccc');
  grad.addColorStop(1, '#888888');
  
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y, PUCK_R, 0, Math.PI*2);
  ctx.fill();
  
  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(x, y, PUCK_R, 0, Math.PI*2);
  ctx.stroke();
  
  ctx.shadowBlur = 0;
}

// ── کنترل لمس/موس ────────────────────────────────
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const src = e.touches ? e.touches[0] : e;
  return {
    x: (src.clientX - rect.left) * scaleX,
    y: (src.clientY - rect.top) * scaleY,
  };
}

function movePlayer(e) {
  if (!gameRunning) return;
  e.preventDefault();
  const pos = getPos(e);
  // فقط نیمه پایین
  const newY = Math.max(H/2 + MALLET_R, Math.min(H - MALLET_R, pos.y));
  const newX = Math.max(MALLET_R, Math.min(W - MALLET_R, pos.x));
  state.player.x = newX;
  state.player.y = newY;
}

canvas.addEventListener('mousemove', movePlayer);
canvas.addEventListener('touchmove', movePlayer, { passive: false });
canvas.addEventListener('touchstart', movePlayer, { passive: false });

// رسم اولیه
draw();
</script>
</body>
</html>
