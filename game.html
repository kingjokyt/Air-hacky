<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ایر هاکی</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
  body {
    background: #0a0a1a;
    font-family: 'Vazirmatn', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    color: #fff;
  }
  #game-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 420px;
    padding: 10px;
    gap: 8px;
  }
  .scoreboard {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 10px 20px;
  }
  .score-box { text-align: center; }
  .score-label { font-size: 11px; opacity: 0.6; letter-spacing: 2px; text-transform: uppercase; }
  .score-value { font-size: 36px; font-weight: 900; line-height: 1; }
  .score-box.player .score-value { color: #00f5ff; }
  .score-box.ai .score-value { color: #ff4466; }
  .score-divider { font-size: 24px; opacity: 0.3; }
  #canvas-wrapper {
    position: relative;
    width: 100%;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0,245,255,0.15), 0 0 80px rgba(255,68,102,0.1);
  }
  #gameCanvas { display: block; width: 100%; cursor: none; }
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    transition: opacity 0.3s;
    z-index: 10;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }
  .overlay-title { font-size: 28px; font-weight: 900; margin-bottom: 8px; }
  .overlay-sub { font-size: 14px; opacity: 0.6; margin-bottom: 20px; text-align: center; }
  .btn {
    background: linear-gradient(135deg, #00f5ff, #0088ff);
    color: #000;
    border: none;
    padding: 14px 36px;
    font-size: 16px;
    font-weight: 700;
    font-family: 'Vazirmatn', sans-serif;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(0,245,255,0.4);
  }
  .btn.red { background: linear-gradient(135deg, #ff4466, #ff0055); box-shadow: 0 0 20px rgba(255,68,102,0.4); }
  .level-btns { display: flex; gap: 10px; margin-bottom: 8px; }
  .level-btn {
    border: 2px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.05);
    color: #fff;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 700;
    font-family: 'Vazirmatn', sans-serif;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .level-btn.easy { border-color: #00ff88; color: #00ff88; }
  .level-btn.medium { border-color: #ffcc00; color: #ffcc00; }
  .level-btn.hard { border-color: #ff4466; color: #ff4466; }
  .level-btn.selected.easy { background: #00ff88; color: #000; box-shadow: 0 0 15px rgba(0,255,136,0.4); }
  .level-btn.selected.medium { background: #ffcc00; color: #000; box-shadow: 0 0 15px rgba(255,204,0,0.4); }
  .level-btn.selected.hard { background: #ff4466; color: #000; box-shadow: 0 0 15px rgba(255,68,102,0.4); }
  .level-badge {
    font-size: 12px;
    padding: 3px 12px;
    border-radius: 20px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .level-badge.easy { background: rgba(0,255,136,0.15); color: #00ff88; border: 1px solid #00ff88; }
  .level-badge.medium { background: rgba(255,204,0,0.15); color: #ffcc00; border: 1px solid #ffcc00; }
  .level-badge.hard { background: rgba(255,68,102,0.15); color: #ff4466; border: 1px solid #ff4466; }
  .goal-flash { position: absolute; inset: 0; pointer-events: none; opacity: 0; z-index: 5; transition: opacity 0.1s; }
  .goal-flash.player { background: radial-gradient(ellipse, rgba(0,245,255,0.3) 0%, transparent 70%); }
  .goal-flash.ai { background: radial-gradient(ellipse, rgba(255,68,102,0.3) 0%, transparent 70%); }
  .goal-flash.show { opacity: 1; }
  .controls-hint { font-size: 11px; opacity: 0.4; text-align: center; letter-spacing: 1px; }
  .btn-lb {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.6);
    padding: 8px 24px;
    font-size: 13px;
    font-family: 'Vazirmatn', sans-serif;
    border-radius: 50px;
    cursor: pointer;
    margin-top: 10px;
  }
  .btn-lb:hover { border-color: rgba(255,255,255,0.5); color: #fff; }
  .lb-panel {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.92);
    backdrop-filter: blur(10px);
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px;
    overflow-y: auto;
  }
  .lb-panel.hidden { display: none; }
  .lb-title { font-size: 22px; font-weight: 900; margin-bottom: 16px; }
  .lb-stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    width: 100%;
    margin-bottom: 16px;
  }
  .lb-stat-box {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 10px 6px;
    text-align: center;
  }
  .lb-stat-val { font-size: 24px; font-weight: 900; }
  .lb-stat-val.win { color: #00ff88; }
  .lb-stat-val.lose { color: #ff4466; }
  .lb-stat-val.rate { color: #ffcc00; }
  .lb-stat-lbl { font-size: 10px; opacity: 0.5; margin-top: 2px; }
  .lb-history-title { font-size: 13px; opacity: 0.5; margin-bottom: 8px; align-self: flex-start; }
  .lb-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    padding: 8px 12px;
    border-radius: 10px;
    margin-bottom: 4px;
    font-size: 13px;
    background: rgba(255,255,255,0.04);
  }
  .lb-row .result { font-weight: 700; }
  .lb-row .result.win { color: #00ff88; }
  .lb-row .result.lose { color: #ff4466; }
  .lb-row .score { opacity: 0.7; }
  .lb-row .level-tag { font-size: 10px; opacity: 0.5; }
  .lb-empty { opacity: 0.4; font-size: 14px; margin-top: 30px; }

  /* تب‌های لیدربرد */
  .lb-tabs {
    display: flex;
    gap: 0;
    width: 100%;
    margin-bottom: 14px;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 4px;
  }
  .lb-tab {
    flex: 1;
    text-align: center;
    padding: 8px 0;
    font-size: 13px;
    font-weight: 700;
    font-family: 'Vazirmatn', sans-serif;
    border-radius: 9px;
    cursor: pointer;
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.4);
    transition: all 0.2s;
  }
  .lb-tab.active {
    background: rgba(255,255,255,0.12);
    color: #fff;
  }
  .lb-tab-content { display: none; width: 100%; }
  .lb-tab-content.active { display: flex; flex-direction: column; align-items: center; width: 100%; }

  /* رنک‌های جهانی */
  .global-row {
    display: flex;
    align-items: center;
    width: 100%;
    padding: 10px 12px;
    border-radius: 12px;
    margin-bottom: 6px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    gap: 10px;
  }
  .global-row.me {
    background: rgba(0,245,255,0.08);
    border-color: rgba(0,245,255,0.25);
  }
  .global-row.top1 { background: rgba(255,200,0,0.08); border-color: rgba(255,200,0,0.3); }
  .global-row.top2 { background: rgba(180,180,180,0.07); border-color: rgba(180,180,180,0.2); }
  .global-row.top3 { background: rgba(200,100,50,0.07); border-color: rgba(200,100,50,0.2); }
  .global-rank { font-size: 18px; min-width: 28px; text-align: center; }
  .global-name { flex: 1; font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .global-stats { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
  .global-wins { font-size: 14px; font-weight: 900; color: #00ff88; }
  .global-rate { font-size: 10px; color: rgba(255,204,0,0.8); }
  .lb-loading { opacity: 0.5; font-size: 14px; margin: 20px 0; }
  .lb-error { color: #ff4466; font-size: 13px; margin: 20px 0; text-align: center; }
  .lb-refresh-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.5);
    padding: 6px 18px;
    font-size: 12px;
    font-family: 'Vazirmatn', sans-serif;
    border-radius: 50px;
    cursor: pointer;
    margin-bottom: 10px;
    align-self: flex-end;
  }

  .pause-menu {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.88);
    backdrop-filter: blur(10px);
    z-index: 15;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }
  .pause-menu.hidden { display: none; }
  .pause-menu {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.82);
    backdrop-filter: blur(10px);
    z-index: 15;
  }
  .pause-menu.hidden { display: none; }
</style>
</head>
<body>
<div id="game-container">
  <div class="scoreboard">
    <div class="score-box ai">
      <div class="score-label">🤖 هوش مصنوعی</div>
      <div class="score-value" id="ai-score">0</div>
    </div>
    <div class="score-divider">|</div>
    <div class="score-box player">
      <div class="score-value" id="player-score">0</div>
      <div class="score-label">شما 🧑</div>
    </div>
  </div>
  <div id="canvas-wrapper">
    <canvas id="gameCanvas"></canvas>
    <div class="goal-flash player" id="player-flash"></div>
    <div class="goal-flash ai" id="ai-flash"></div>
    <div id="overlay">
      <div class="overlay-title">🏒 ایر هاکی</div>
      <div class="overlay-sub">شما پایین هستید<br>هوش مصنوعی بالا</div>
      <div class="level-btns">
        <button class="level-btn easy selected" onclick="selectLevel('easy', this)">😊 آسون</button>
        <button class="level-btn medium" onclick="selectLevel('medium', this)">😤 متوسط</button>
        <button class="level-btn hard" onclick="selectLevel('hard', this)">💀 سخت</button>
      </div>
      <button class="btn" onclick="startGame()">شروع بازی</button>
      <button class="btn-lb" onclick="showLeaderboard()">🏆 لیدربرد</button>
    </div>

    <div id="pause-menu" class="pause-menu hidden">
      <div class="overlay-title">⏸ پاز</div>
      <div class="overlay-sub">بازی متوقف شده</div>
      <button class="btn" onclick="resumeGame()">▶️ ادامه بازی</button>
      <button class="btn red" style="margin-top:10px" onclick="surrenderGame()">🏳️ تسلیم شدن</button>
    </div>

    <div id="pause-menu" class="pause-menu hidden">
      <div class="overlay-title">⏸ پاز</div>
      <div class="overlay-sub">بازی متوقف شد</div>
      <button class="btn" onclick="resumeGame()">▶️ ادامه بازی</button>
      <button class="btn red" style="margin-top:10px" onclick="surrenderGame()">🏳️ تسلیم شدن</button>
    </div>

    <div id="leaderboard-panel" class="lb-panel hidden">
      <div class="lb-title">🏆 لیدربرد</div>

      <!-- تب‌ها -->
      <div class="lb-tabs">
        <button class="lb-tab active" onclick="switchTab('mine')">📊 آمار من</button>
        <button class="lb-tab" onclick="switchTab('global')">🌍 برترین‌ها</button>
      </div>

      <!-- تب آمار شخصی -->
      <div id="tab-mine" class="lb-tab-content active">
        <div id="lb-stats"></div>
        <div id="lb-history"></div>
      </div>

      <!-- تب لیدربرد جهانی -->
      <div id="tab-global" class="lb-tab-content">
        <button class="lb-refresh-btn" onclick="loadGlobalLeaderboard()">🔄 بروزرسانی</button>
        <div id="global-lb-content">
          <div class="lb-loading">در حال بارگذاری...</div>
        </div>
      </div>

      <button class="btn-lb" onclick="hideLeaderboard()">✕ بستن</button>
    </div>
  </div>
  <div style="display:flex;align-items:center;justify-content:space-between;width:100%">
    <div class="controls-hint">لمس کنید و بکشید</div>
    <button id="pause-btn" onclick="togglePause()" style="
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.15);
      color:#fff;
      width:38px;height:38px;
      border-radius:50%;
      font-size:16px;
      cursor:pointer;
      display:flex;align-items:center;justify-content:center;
    ">⏸</button>
  </div>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

// ── لیدربرد (ذخیره در localStorage) ──
const LB_KEY = 'airhockey_stats';

function loadStats() {
  try {
    return JSON.parse(localStorage.getItem(LB_KEY)) || { wins: 0, losses: 0, history: [] };
  } catch { return { wins: 0, losses: 0, history: [] }; }
}

function saveStats(stats) {
  try { localStorage.setItem(LB_KEY, JSON.stringify(stats)); } catch {}
}

function recordResult(winner, pScore, aScore, level) {
  const stats = loadStats();
  if (winner === 'player') stats.wins++;
  else stats.losses++;
  stats.history.unshift({
    winner,
    playerScore: pScore,
    aiScore: aScore,
    level,
    date: new Date().toLocaleDateString('fa-IR')
  });
  if (stats.history.length > 20) stats.history = stats.history.slice(0, 20);
  saveStats(stats);
}

// ── آدرس API لیدربرد جهانی - اینجا آدرس هاستت رو بذار ──
const LEADERBOARD_API = 'https://YOUR-HOST.com/leaderboard.php';

let currentTab = 'mine';
let globalDataCache = null;

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.lb-tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'mine') || (i === 1 && tab === 'global'));
  });
  document.getElementById('tab-mine').classList.toggle('active', tab === 'mine');
  document.getElementById('tab-global').classList.toggle('active', tab === 'global');

  if (tab === 'global' && !globalDataCache) {
    loadGlobalLeaderboard();
  }
}

async function loadGlobalLeaderboard() {
  const container = document.getElementById('global-lb-content');
  container.innerHTML = '<div class="lb-loading">⏳ در حال بارگذاری...</div>';

  try {
    const res = await fetch(LEADERBOARD_API, { cache: 'no-store' });
    if (!res.ok) throw new Error('خطای سرور');
    const json = await res.json();
    if (!json.ok) throw new Error('داده نامعتبر');

    globalDataCache = json.players;
    renderGlobalLeaderboard(json.players);
  } catch (e) {
    container.innerHTML = `
      <div class="lb-error">❌ خطا در بارگذاری<br><small>${e.message}</small></div>
      <button class="btn-lb" onclick="loadGlobalLeaderboard()" style="margin-top:8px">دوباره تلاش</button>
    `;
  }
}

function renderGlobalLeaderboard(players) {
  const container = document.getElementById('global-lb-content');
  const myId = tg?.initDataUnsafe?.user?.id;

  if (!players || players.length === 0) {
    container.innerHTML = '<div class="lb-empty">هنوز کسی بازی نکرده!</div>';
    return;
  }

  const medals = ['🥇','🥈','🥉'];
  const rankClasses = ['top1','top2','top3'];

  let html = '';
  players.forEach((p, i) => {
    const rank = medals[i] || `${i + 1}`;
    const rankClass = rankClasses[i] || '';
    const isMe = myId && String(myId) === String(p.uid);
    html += `
      <div class="global-row ${rankClass} ${isMe ? 'me' : ''}">
        <div class="global-rank">${rank}</div>
        <div class="global-name">${escapeHtml(p.name)}${isMe ? ' 👈' : ''}</div>
        <div class="global-stats">
          <div class="global-wins">🏆 ${p.wins}</div>
          <div class="global-rate">${p.rate}% | ${p.total} بازی</div>
        </div>
      </div>`;
  });

  container.innerHTML = html;
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showLeaderboard() {
  // ریست به تب اول
  switchTab('mine');
  globalDataCache = null;

  const stats = loadStats();
  const total = stats.wins + stats.losses;
  const rate = total > 0 ? Math.round((stats.wins / total) * 100) : 0;

  document.getElementById('lb-stats').innerHTML = `
    <div class="lb-stats-grid">
      <div class="lb-stat-box">
        <div class="lb-stat-val win">${stats.wins}</div>
        <div class="lb-stat-lbl">برد</div>
      </div>
      <div class="lb-stat-box">
        <div class="lb-stat-val lose">${stats.losses}</div>
        <div class="lb-stat-lbl">باخت</div>
      </div>
      <div class="lb-stat-box">
        <div class="lb-stat-val rate">${rate}%</div>
        <div class="lb-stat-lbl">نرخ برد</div>
      </div>
    </div>
  `;

  const levelNames = { easy: '😊', medium: '😤', hard: '💀' };
  let histHTML = '<div class="lb-history-title">آخرین بازی‌ها</div>';
  if (stats.history.length === 0) {
    histHTML += '<div class="lb-empty">هنوز بازی نکردید!</div>';
  } else {
    stats.history.forEach(h => {
      const won = h.winner === 'player';
      histHTML += `
        <div class="lb-row">
          <span class="result ${won ? 'win' : 'lose'}">${won ? '🏆 برد' : '💔 باخت'}</span>
          <span class="score">${h.playerScore} - ${h.aiScore}</span>
          <span class="level-tag">${levelNames[h.level] || ''} ${h.date}</span>
        </div>`;
    });
  }
  document.getElementById('lb-history').innerHTML = histHTML;
  document.getElementById('leaderboard-panel').classList.remove('hidden');
}

function hideLeaderboard() {
  document.getElementById('leaderboard-panel').classList.add('hidden');
}

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const W = 360, H = 540;
canvas.width = W;
canvas.height = H;

const WINNING_SCORE = 7;
const MALLET_R = 26;
const PUCK_R = 18;
const GOAL_W = 120;
const gx1 = (W - GOAL_W) / 2;
const gx2 = gx1 + GOAL_W;

// سطح بازی
let currentLevel = 'easy';
// احتمال اینکه AI بره سمت توپ (0 تا 1)
const LEVELS = {
  easy:   { speed: 2.2, chaseChance: 0.3, crossLine: false, predFrames: 0 },
  medium: { speed: 3.5, chaseChance: 0.65, crossLine: true,  predFrames: 4  },
  hard:   { speed: 9.0, chaseChance: 1.0, crossLine: true,  predFrames: 12 },
};

// تصمیم AI برای هر گل - آیا این دفعه دنبال توپ بره؟
let aiWillChase = false;

let paused = false;

// افکت نور دیوار
let wallFlash = { left: 0, right: 0, top: 0, bottom: 0 }; // 0..1

// بهبود مالت بازیکن: سرعت قبلی برای محاسبه ضربه
let prevPlayerX = W/2, prevPlayerY = H - 90;
let playerVelX = 0, playerVelY = 0;

function selectLevel(level, btn) {
  currentLevel = level;
  document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

// امتیازها رو جدا از state نگه میداریم
let playerScore = 0;
let aiScore = 0;

let puck, player, ai, targetAiX, targetAiY;
let animId = null;
let gameRunning = false;
let lastTime = 0;
let scoring = false; // جلوگیری از گل چندگانه
let stuckTimer = 0; // تایمر برای تشخیص گیر کردن توپ
let lastPuckX = 0, lastPuckY = 0;

function resetPuck(dir) {
  puck = { 
    x: W/2, y: H/2, 
    vx: (Math.random() - 0.5) * 6, 
    vy: dir === 'down' ? 5 : -5 
  };
  // تصمیم بگیر این راند AI دنبال توپ میره یا نه
  const lvl = LEVELS[currentLevel];
  aiWillChase = Math.random() < lvl.chaseChance;
}

function initPositions() {
  player = { x: W/2, y: H - 90 };
  ai = { x: W/2, y: 90 };
  targetAiX = W/2;
  targetAiY = 90;
  resetPuck('down');
}

function startGame() {
  document.getElementById('overlay').classList.add('hidden');
  playerScore = 0;
  aiScore = 0;
  document.getElementById('player-score').textContent = '0';
  document.getElementById('ai-score').textContent = '0';
  scoring = false;
  paused = false;
  const pb = document.getElementById('pause-btn');
  if (pb) pb.textContent = '⏸';
  initPositions();
  gameRunning = true;
  lastTime = performance.now();
  if (animId) cancelAnimationFrame(animId);
  loop(lastTime);
}

function loop(ts) {
  const dt = Math.min((ts - lastTime) / 16.67, 3);
  lastTime = ts;
  if (!paused) update(dt);
  draw();
  if (gameRunning) animId = requestAnimationFrame(loop);
}

function togglePause() {
  if (!gameRunning) return;
  paused = !paused;
  const btn = document.getElementById('pause-btn');
  btn.textContent = paused ? '▶️' : '⏸';
  document.getElementById('pause-menu').classList.toggle('hidden', !paused);
}

function resumeGame() {
  paused = false;
  document.getElementById('pause-btn').textContent = '⏸';
  document.getElementById('pause-menu').classList.add('hidden');
}

function surrenderGame() {
  document.getElementById('pause-menu').classList.add('hidden');
  paused = false;
  gameRunning = false;
  // ثبت باخت
  recordResult('ai', playerScore, WINNING_SCORE, currentLevel);
  if (tg) tg.sendData(JSON.stringify({ playerScore, aiScore: WINNING_SCORE, winner: 'ai', level: currentLevel }));
  const stats = loadStats();
  const total = stats.wins + stats.losses;
  const rate = total > 0 ? Math.round((stats.wins / total) * 100) : 0;
  const levelNames = { easy: 'آسون', medium: 'متوسط', hard: 'سخت' };
  const overlay = document.getElementById('overlay');
  overlay.innerHTML = `
    <div class="overlay-title">🏳️ تسلیم شدید!</div>
    <div class="level-badge ${currentLevel}">${levelNames[currentLevel]}</div>
    <div class="overlay-sub">نتیجه: ${playerScore} - ${aiScore}</div>
    <div class="lb-stats-grid" style="width:90%;margin:10px 0">
      <div class="lb-stat-box"><div class="lb-stat-val win">${stats.wins}</div><div class="lb-stat-lbl">کل برد</div></div>
      <div class="lb-stat-box"><div class="lb-stat-val lose">${stats.losses}</div><div class="lb-stat-lbl">کل باخت</div></div>
      <div class="lb-stat-box"><div class="lb-stat-val rate">${rate}%</div><div class="lb-stat-lbl">نرخ برد</div></div>
    </div>
    <div class="level-btns">
      <button class="level-btn easy ${currentLevel==='easy'?'selected':''}" onclick="selectLevel('easy', this)">😊 آسون</button>
      <button class="level-btn medium ${currentLevel==='medium'?'selected':''}" onclick="selectLevel('medium', this)">😤 متوسط</button>
      <button class="level-btn hard ${currentLevel==='hard'?'selected':''}" onclick="selectLevel('hard', this)">💀 سخت</button>
    </div>
    <button class="btn red" onclick="startGame()">دوباره بازی کن</button>
    <button class="btn-lb" onclick="showLeaderboard()">🏆 تاریخچه کامل</button>
  `;
  overlay.classList.remove('hidden');
}

function update(dt) {
  if (scoring) return; // اگه گل خورده صبر کن

  puck.x += puck.vx * dt;
  puck.y += puck.vy * dt;

  // دیوار چپ و راست
  if (puck.x - PUCK_R < 0) { puck.x = PUCK_R; puck.vx = Math.abs(puck.vx); wallFlash.left = 1; }
  if (puck.x + PUCK_R > W) { puck.x = W - PUCK_R; puck.vx = -Math.abs(puck.vx); wallFlash.right = 1; }

  // گل بالا = بازیکن امتیاز گرفت
  if (puck.y - PUCK_R < 0) {
    if (puck.x > gx1 && puck.x < gx2) {
      doScore('player');
      return;
    } else {
      puck.y = PUCK_R;
      puck.vy = Math.abs(puck.vy);
      wallFlash.top = 1;
    }
  }

  // گل پایین = هوش مصنوعی امتیاز گرفت
  if (puck.y + PUCK_R > H) {
    if (puck.x > gx1 && puck.x < gx2) {
      doScore('ai');
      return;
    } else {
      puck.y = H - PUCK_R;
      puck.vy = -Math.abs(puck.vy);
      wallFlash.bottom = 1;
    }
  }

  // محاسبه سرعت مالت بازیکن
  playerVelX = player.x - prevPlayerX;
  playerVelY = player.y - prevPlayerY;
  prevPlayerX = player.x;
  prevPlayerY = player.y;

  collideMallet(player, playerVelX, playerVelY);
  collideMallet(ai, 0, 0);
  updateAI(dt);

  // fade افکت دیوار
  const fadeSpeed = 0.15;
  wallFlash.left   = Math.max(0, wallFlash.left   - fadeSpeed * dt);
  wallFlash.right  = Math.max(0, wallFlash.right  - fadeSpeed * dt);
  wallFlash.top    = Math.max(0, wallFlash.top    - fadeSpeed * dt);
  wallFlash.bottom = Math.max(0, wallFlash.bottom - fadeSpeed * dt);

  // تشخیص گیر کردن توپ - اگه ۳ ثانیه تکون نخورد ریست کن
  const moved = Math.hypot(puck.x - lastPuckX, puck.y - lastPuckY);
  if (moved < 0.5) {
    stuckTimer += dt;
    if (stuckTimer > 180) { // حدود ۳ ثانیه
      puck.x = W / 2;
      puck.y = H / 2;
      puck.vx = (Math.random() - 0.5) * 8;
      puck.vy = Math.random() > 0.5 ? 5 : -5;
      stuckTimer = 0;
    }
  } else {
    stuckTimer = 0;
  }
  lastPuckX = puck.x;
  lastPuckY = puck.y;

  const MAX_SPEED = 18;
  const MIN_SPEED = 3;
  let speed = Math.hypot(puck.vx, puck.vy);

  // اگه توپ خیلی کند شد (گیر کرده) سرعتش رو بده
  if (speed < MIN_SPEED && speed > 0) {
    puck.vx = puck.vx / speed * MIN_SPEED;
    puck.vy = puck.vy / speed * MIN_SPEED;
  }
  // اگه کاملاً متوقف شد ریستش کن
  if (speed === 0) {
    puck.vx = (Math.random() - 0.5) * 6;
    puck.vy = 4;
  }

  if (speed > MAX_SPEED) {
    puck.vx = puck.vx / speed * MAX_SPEED;
    puck.vy = puck.vy / speed * MAX_SPEED;
  }

  // اگه توپ خیلی وقته داره فقط افقی حرکت میکنه، یکم زاویه بده
  if (Math.abs(puck.vy) < 1) {
    puck.vy = puck.vy >= 0 ? 2 : -2;
  }
}

function collideMallet(mallet, malletVelX, malletVelY) {
  const dx = puck.x - mallet.x;
  const dy = puck.y - mallet.y;
  const dist = Math.hypot(dx, dy);
  const minDist = MALLET_R + PUCK_R;
  if (dist < minDist && dist > 0) {
    const nx = dx / dist;
    const ny = dy / dist;
    // توپ رو کاملاً بیرون از مالت بذار
    puck.x = mallet.x + nx * (minDist + 2);
    puck.y = mallet.y + ny * (minDist + 2);
    const dot = puck.vx * nx + puck.vy * ny;
    if (dot < 0) {
      puck.vx -= 2 * dot * nx;
      puck.vy -= 2 * dot * ny;
    }
    // سرعت مالت رو به توپ اضافه کن
    // برای بازیکن: ضریب بالاتر = ضربه قوی‌تر
    const isPlayer = mallet === player;
    const velBoost = isPlayer ? 1.2 : 0.5;
    puck.vx += malletVelX * velBoost;
    puck.vy += malletVelY * velBoost;

    // اگه بازیکنه و مالت داره حرکت میکنه، توپ رو تو جهت حرکت پرتاب کن
    if (isPlayer) {
      const malletSpeed = Math.hypot(malletVelX, malletVelY);
      if (malletSpeed > 1.5) {
        // جهت ضربه رو با جهت حرکت مالت ترکیب کن
        const mvx = malletVelX / malletSpeed;
        const mvy = malletVelY / malletSpeed;
        const currentSpeed = Math.hypot(puck.vx, puck.vy);
        const newSpeed = Math.max(currentSpeed, malletSpeed * 3 + 5);
        puck.vx = (nx * 0.4 + mvx * 0.6) * newSpeed;
        puck.vy = (ny * 0.4 + mvy * 0.6) * newSpeed;
      }
    }

    // حداقل سرعت بعد از برخورد
    const spd = Math.hypot(puck.vx, puck.vy);
    if (spd < 5) {
      puck.vx = nx * 5;
      puck.vy = ny * 5;
    }
    puck.x = Math.max(PUCK_R + 1, Math.min(W - PUCK_R - 1, puck.x));
    puck.y = Math.max(PUCK_R + 1, Math.min(H - PUCK_R - 1, puck.y));
  }
}

function updateAI(dt) {
  const lvl = LEVELS[currentLevel];
  const aiZone = H / 2;
  const puckInAiHalf = puck.y < aiZone;

  if (aiWillChase && puckInAiHalf) {
    // توپ اومده تو زمین AI و این راند تصمیم گرفته بره دنبالش
    let predX = puck.x + puck.vx * lvl.predFrames;
    let predY = puck.y + puck.vy * lvl.predFrames;
    targetAiX = predX;
    targetAiY = Math.max(MALLET_R, Math.min(aiZone - MALLET_R, predY));
  } else {
    // توپ تو زمین بازیکنه یا این راند chase نمیکنه
    // برگرد وسط زمین خودت
    targetAiX = W / 2;
    targetAiY = aiZone / 2;
  }

  targetAiX = Math.max(MALLET_R, Math.min(W - MALLET_R, targetAiX));
  targetAiY = Math.max(MALLET_R, Math.min(aiZone - MALLET_R, targetAiY));

  const speed = lvl.speed * dt;
  const dxAi = targetAiX - ai.x;
  const dyAi = targetAiY - ai.y;
  const dist = Math.hypot(dxAi, dyAi);
  if (dist > 1) {
    ai.x += (dxAi / dist) * Math.min(speed, dist);
    ai.y += (dyAi / dist) * Math.min(speed, dist);
  }
}

function doScore(who) {
  if (scoring) return;
  scoring = true;

  // فوری توپ رو وسط ببر تا دیگه گل تشخیص داده نشه
  puck.x = W / 2;
  puck.y = H / 2;
  puck.vx = 0;
  puck.vy = 0;

  if (who === 'player') {
    playerScore++;
    document.getElementById('player-score').textContent = playerScore;
    flashGoal('player');
  } else {
    aiScore++;
    document.getElementById('ai-score').textContent = aiScore;
    flashGoal('ai');
  }

  if (playerScore >= WINNING_SCORE || aiScore >= WINNING_SCORE) {
    gameRunning = false;
    setTimeout(() => endGame(who), 800);
    return;
  }

  // ریست بعد از گل
  setTimeout(() => {
    initPositions();
    scoring = false;
  }, 800);
}

function flashGoal(who) {
  const el = document.getElementById(who + '-flash');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 400);
}

function endGame(winner) {
  // ذخیره نتیجه در لیدربرد
  recordResult(winner, playerScore, aiScore, currentLevel);

  // ارسال به بات تلگرام
  if (tg) {
    tg.sendData(JSON.stringify({
      playerScore, aiScore, winner, level: currentLevel
    }));
  }

  const stats = loadStats();
  const total = stats.wins + stats.losses;
  const rate = total > 0 ? Math.round((stats.wins / total) * 100) : 0;

  const levelNames = { easy: 'آسون', medium: 'متوسط', hard: 'سخت' };
  const levelClass = currentLevel;
  const overlay = document.getElementById('overlay');
  overlay.innerHTML = `
    <div class="overlay-title">${winner === 'player' ? '🎉 بردید!' : '😔 باختید!'}</div>
    <div class="level-badge ${levelClass}">${levelNames[currentLevel]}</div>
    <div class="overlay-sub">نتیجه: ${playerScore} - ${aiScore}</div>
    <div class="lb-stats-grid" style="width:90%;margin:10px 0">
      <div class="lb-stat-box"><div class="lb-stat-val win">${stats.wins}</div><div class="lb-stat-lbl">کل برد</div></div>
      <div class="lb-stat-box"><div class="lb-stat-val lose">${stats.losses}</div><div class="lb-stat-lbl">کل باخت</div></div>
      <div class="lb-stat-box"><div class="lb-stat-val rate">${rate}%</div><div class="lb-stat-lbl">نرخ برد</div></div>
    </div>
    <div class="level-btns">
      <button class="level-btn easy ${currentLevel==='easy'?'selected':''}" onclick="selectLevel('easy', this)">😊 آسون</button>
      <button class="level-btn medium ${currentLevel==='medium'?'selected':''}" onclick="selectLevel('medium', this)">😤 متوسط</button>
      <button class="level-btn hard ${currentLevel==='hard'?'selected':''}" onclick="selectLevel('hard', this)">💀 سخت</button>
    </div>
    <button class="btn ${winner === 'ai' ? 'red' : ''}" onclick="startGame()">دوباره بازی کن</button>
    <button class="btn-lb" onclick="showLeaderboard()">🏆 تاریخچه کامل</button>
  `;
  overlay.classList.remove('hidden');
}

// ── رسم ──
function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0f0f2a';
  ctx.fillRect(0, 0, W, H);

  // افکت نور دیوار
  const wallAlpha = 0.55;
  if (wallFlash.left > 0) {
    const g = ctx.createLinearGradient(0, 0, 40, 0);
    g.addColorStop(0, `rgba(0,245,255,${wallFlash.left * wallAlpha})`);
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, 40, H);
  }
  if (wallFlash.right > 0) {
    const g = ctx.createLinearGradient(W, 0, W-40, 0);
    g.addColorStop(0, `rgba(0,245,255,${wallFlash.right * wallAlpha})`);
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.fillRect(W-40, 0, 40, H);
  }
  if (wallFlash.top > 0) {
    const g = ctx.createLinearGradient(0, 0, 0, 40);
    g.addColorStop(0, `rgba(255,68,102,${wallFlash.top * wallAlpha})`);
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, 40);
  }
  if (wallFlash.bottom > 0) {
    const g = ctx.createLinearGradient(0, H, 0, H-40);
    g.addColorStop(0, `rgba(0,245,255,${wallFlash.bottom * wallAlpha})`);
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.fillRect(0, H-40, W, 40);
  }

  // خط میانی
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 2;
  ctx.setLineDash([12, 8]);
  ctx.beginPath();
  ctx.moveTo(0, H/2); ctx.lineTo(W, H/2);
  ctx.stroke();
  ctx.setLineDash([]);

  // دایره مرکزی
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(W/2, H/2, 50, 0, Math.PI*2);
  ctx.stroke();

  // دروازه بالا
  ctx.fillStyle = 'rgba(255,68,102,0.12)';
  ctx.fillRect(gx1, 0, GOAL_W, 8);
  ctx.strokeStyle = '#ff4466';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(gx1, 0); ctx.lineTo(gx1, 16);
  ctx.moveTo(gx2, 0); ctx.lineTo(gx2, 16);
  ctx.stroke();
  ctx.strokeStyle = 'rgba(255,68,102,0.5)';
  ctx.beginPath();
  ctx.moveTo(gx1, 0); ctx.lineTo(gx2, 0);
  ctx.stroke();

  // دروازه پایین
  ctx.fillStyle = 'rgba(0,245,255,0.12)';
  ctx.fillRect(gx1, H-8, GOAL_W, 8);
  ctx.strokeStyle = '#00f5ff';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(gx1, H); ctx.lineTo(gx1, H-16);
  ctx.moveTo(gx2, H); ctx.lineTo(gx2, H-16);
  ctx.stroke();
  ctx.strokeStyle = 'rgba(0,245,255,0.5)';
  ctx.beginPath();
  ctx.moveTo(gx1, H); ctx.lineTo(gx2, H);
  ctx.stroke();

  drawMallet(ai.x, ai.y, '#ff4466', '#ff0044');
  drawMallet(player.x, player.y, '#00f5ff', '#00ccdd');
  drawPuck(puck.x, puck.y);
}

function drawMallet(x, y, color, inner) {
  ctx.shadowColor = color;
  ctx.shadowBlur = 20;
  ctx.strokeStyle = color;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(x, y, MALLET_R, 0, Math.PI*2);
  ctx.stroke();
  const grad = ctx.createRadialGradient(x-4, y-4, 2, x, y, MALLET_R-4);
  grad.addColorStop(0, 'rgba(255,255,255,0.25)');
  grad.addColorStop(1, inner + 'aa');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y, MALLET_R-3, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(x, y, 5, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;
}

function drawPuck(x, y) {
  ctx.shadowColor = 'rgba(255,255,255,0.6)';
  ctx.shadowBlur = 15;
  const grad = ctx.createRadialGradient(x-4, y-4, 1, x, y, PUCK_R);
  grad.addColorStop(0, '#ffffff');
  grad.addColorStop(0.5, '#cccccc');
  grad.addColorStop(1, '#888888');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y, PUCK_R, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;
}

// ── کنترل لمس ──
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const src = e.touches ? e.touches[0] : e;
  return {
    x: (src.clientX - rect.left) * scaleX,
    y: (src.clientY - rect.top) * scaleY,
  };
}

function movePlayer(e) {
  if (!gameRunning) return;
  e.preventDefault();
  const pos = getPos(e);
  player.x = Math.max(MALLET_R, Math.min(W - MALLET_R, pos.x));
  player.y = Math.max(H/2 + MALLET_R, Math.min(H - MALLET_R, pos.y));
}

canvas.addEventListener('mousemove', movePlayer);
canvas.addEventListener('touchmove', movePlayer, { passive: false });
canvas.addEventListener('touchstart', movePlayer, { passive: false });

draw();
</script>
